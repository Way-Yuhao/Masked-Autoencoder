defaults:
  - default
  - override launcher: submitit_slurm
  - _self_

# slurm launcher configuration
launcher:
  name: ${hydra.job.name}
  timeout_min: 7200
  nodes: 1
  tasks_per_node: 6
  cpus_per_task: 18
  gpus_per_node: 6
  mem_gb: 700

